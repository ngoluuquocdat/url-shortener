# Auto-loaded in Development
services:
  postgres:
    ports: 
      - "5464:5432"
  
  migrator:
    build:
      context: ../
      dockerfile: Dockerfile
      target: migrator
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  api:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
     - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development