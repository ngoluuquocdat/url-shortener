# Default compose file. Used by `docker compose up`.
# Optimized for development: bind mounts, hot reload, dev images.
# Production overrides live in docker-compose.prod.yml.

services:
  postgres:
    image: postgres:16-alpine
    container_name: url-shortener-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-url_shortener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-url_shortener_dev}
      POSTGRES_DB: ${POSTGRES_DB:-url_shortener}
    ports:
      - "5464:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-url_shortener} -d ${POSTGRES_DB:-url_shortener}"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  migrator:
    build:
      context: ../
      dockerfile: Dockerfile
      target: migrator
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=url_shortener;Username=url_shortener;Password=url_shortener_dev
    depends_on:
      postgres:
        condition: service_healthy
  
  api:
    build:
      context: ../
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=url_shortener;Username=url_shortener;Password=url_shortener_dev
    depends_on:
      migrator:
        condition: service_completed_successfully

volumes:
  postgres_data:
