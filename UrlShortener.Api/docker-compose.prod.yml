# Docker Compose file optimized for production environment

services:
  postgres:
    restart: unless-stopped
  
  api:
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot

  nginx:
    image: nginx:alpine
    ports:
     - "80:80"
     - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on: [api]
    restart: unless-stopped

volumes:
  certbot_certs:       # holds /etc/letsencrypt (the certs)
  certbot_webroot:     # holds the ACME challenge files
