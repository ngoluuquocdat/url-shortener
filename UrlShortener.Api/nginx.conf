# HTTP: serve ACME challenge, redirect everything else to HTTPS
server {
    listen 80;
    server_name urlshortener.nlqdat.io.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: terminate TLS, proxy to the API
server {
    listen 443 ssl;
    server_name urlshortener.nlqdat.io.vn;

    ssl_certificate         /etc/letsencrypt/live/urlshortener.nlqdat.io.vn/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/urlshortener.nlqdat.io.vn/privkey.pem;

    location / {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
